databases:
  - name: cloud-risk-db
    databaseName: cloud_risk
    user: cloud_risk

services:
  - type: web
    name: cloud-risk-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cloud-risk-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false
      - key: API_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
